[workspace]

members = [
  "core",
  "query-ast",
  "query-cypher",
  "query-gql",
  "functions-cypher",
  "functions-gql",
  "middleware",
  "lib",

  # Source Plugins
  "components/sources/postgres",
  "components/sources/http",
  "components/sources/grpc",
  "components/sources/platform",
  "components/sources/application",
  "components/sources/mock",
  "components/sources/mssql",

  # Bootstrap Plugins
  "components/bootstrappers/postgres",
  "components/bootstrappers/platform",
  "components/bootstrappers/scriptfile",
  "components/bootstrappers/application",
  "components/bootstrappers/noop",
  "components/bootstrappers/mssql",

  # Reaction Plugins
  "components/reactions/http",
  "components/reactions/http-adaptive",
  "components/reactions/grpc",
  "components/reactions/grpc-adaptive",
  "components/reactions/sse",
  "components/reactions/platform",
  "components/reactions/profiler",
  "components/reactions/application",
  "components/reactions/log",
  "components/reactions/storedproc-mssql",
  "components/reactions/storedproc-mysql",
  "components/reactions/storedproc-postgres",

  # Index Plugins
  "components/indexes/rocksdb",
  "components/indexes/garnet",

  # State Store Plugins
  "components/state_stores/redb",

  # Shared component libraries
  "components/mssql-common",

  # FFI Primitives (shared FFI types and macros)
  "components/ffi-primitives",

  # Plugin SDK
  "components/plugin-sdk",

  # Host SDK (host-side plugin loading and proxy types)
  "components/host-sdk",

  # Build tooling
  "xtask",

  # Internal
  "shared-tests",
  "query-perf",
  "examples/query",
  "lib-integration-tests",
  ]

# Exclude internal crates from workspace packaging
exclude = [
  "shared-tests",
  "query-perf",
  "examples/query",
  "lib-integration-tests",
  "xtask",
]

resolver = "2"

[workspace.package]
version = "0.4.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/drasi-project/drasi-core"
keywords = ["drasi"]
categories = ["database"]

[workspace.dependencies]
# Internal workspace crates
drasi-query-ast = { path = "query-ast" }
drasi-query-cypher = { path = "query-cypher" }
drasi-query-gql = { path = "query-gql" }
drasi-core = { path = "core" }
drasi-functions-cypher = { path = "functions-cypher" }
drasi-functions-gql = { path = "functions-gql" }
drasi-middleware = { path = "middleware" }
drasi-lib = { path = "lib" }
drasi-ffi-primitives = { path = "components/ffi-primitives" }
drasi-plugin-sdk = { path = "components/plugin-sdk" }
drasi-host-sdk = { path = "components/host-sdk" }

# Common dependencies
utoipa = { version = "4", features = ["chrono"] }
drasi-index-rocksdb = { path = "components/indexes/rocksdb" }
drasi-index-garnet = { path = "components/indexes/garnet" }

# Component plugins
drasi-source-mssql = { path = "components/sources/mssql" }
drasi-bootstrap-mssql = { path = "components/bootstrappers/mssql" }
drasi-bootstrap-postgres = { path = "components/bootstrappers/postgres" }
drasi-reaction-application = { path = "components/reactions/application" }
drasi-source-postgres = { path = "components/sources/postgres" }
drasi-source-application = { path = "components/sources/application" }
drasi-bootstrap-application = { path = "components/bootstrappers/application" }
drasi-reaction-http = { path = "components/reactions/http" }
drasi-reaction-grpc = { path = "components/reactions/grpc" }
drasi-mssql-common = { path = "components/mssql-common" }

[workspace.lints.rust]
warnings = "deny"
unused = "allow"

[workspace.lints.clippy]
print_stdout = "warn"
unwrap_used = "warn"
uninlined_format_args = "warn"
module_inception = "allow"
ptr_arg = "allow"
type_complexity = "allow"
large_enum_variant = "allow"

[profile.release]
codegen-units = 1
lto = true
