[package]
name = "drasi-identity-azure"
version = "0.1.0"
edition = "2021"
authors = ["Drasi Project"]
description = "Azure identity provider plugin for Drasi"
license = "Apache-2.0"
repository = "https://github.com/drasi-project/drasi-core"
keywords = ["drasi", "plugin", "identity", "azure"]
categories = ["authentication"]

[lib]
crate-type = ["lib", "cdylib"]

[lints]
workspace = true

[dependencies]
drasi-lib.workspace = true
drasi-plugin-sdk = { workspace = true }
utoipa = { workspace = true }
anyhow = "1.0"
async-trait = "0.1"
log = "0.4"
tokio = { version = "1.0", features = ["rt-multi-thread", "sync"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
azure_identity = { version = "0.31", default-features = false, features = ["tokio"] }
azure_core = { version = "0.31", default-features = false, features = ["tokio", "reqwest"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }

[features]
dynamic-plugin = []
