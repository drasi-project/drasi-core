[package]
name = "drasi-identity-aws"
version = "0.1.0"
edition = "2021"
authors = ["Drasi Project"]
description = "AWS identity provider plugin for Drasi"
license = "Apache-2.0"
repository = "https://github.com/drasi-project/drasi-core"
keywords = ["drasi", "plugin", "identity", "aws"]
categories = ["authentication"]

[lib]
crate-type = ["lib", "cdylib"]

[lints]
workspace = true

[dependencies]
drasi-lib.workspace = true
drasi-plugin-sdk = { workspace = true }
utoipa = { workspace = true }
anyhow = "1.0"
async-trait = "0.1"
log = "0.4"
tokio = { version = "1.0", features = ["rt-multi-thread", "sync"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
aws-config = ">=1.5, <1.5.13"
aws-sdk-rds = "1.77"
aws-sdk-sts = ">=1.50, <1.72"

# Pin transitive AWS SDK deps to pre-MSRV-1.91 versions.
# The AWS SDK ecosystem bumped MSRV to 1.91 in Feb 2026 releases;
# these caps ensure compatibility with rustc 1.88.
aws-smithy-types = ">=1.2, <1.4.4"
aws-smithy-runtime = ">=1.7, <1.8"
aws-smithy-runtime-api = ">=1.7, <1.8"
aws-smithy-async = ">=1.2, <1.2.12"
aws-smithy-http = ">=0.60, <0.63"
aws-smithy-json = ">=0.61, <0.62"
aws-smithy-xml = ">=0.60, <0.60.14"
aws-credential-types = ">=1.2, <1.2.12"
aws-runtime = ">=1.5, <1.6"
aws-types = ">=1.3, <1.3.12"
aws-sigv4 = ">=1.2, <1.4"

[features]
dynamic-plugin = []
