[package]
name = "drasi-source-kubernetes"
version = "0.1.0"
edition = "2021"
authors = ["Drasi Project"]
description = "Kubernetes source plugin for Drasi"
license = "Apache-2.0"
repository = "https://github.com/drasi-project/drasi-core"
keywords = ["drasi", "plugin", "source", "kubernetes"]
categories = ["database"]

[lib]
crate-type = ["lib", "cdylib"]

[lints]
workspace = true

[dependencies]
drasi-lib.workspace = true
drasi-core.workspace = true
drasi-plugin-sdk = { workspace = true }
utoipa = { workspace = true }
anyhow = "1.0"
async-trait = "0.1"
log = "0.4"
tracing = "0.1"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
kube = { version = "0.98", features = ["client", "runtime", "derive"] }
k8s-openapi = { version = "0.24", features = ["v1_32"] }
tokio-stream = "0.1"
prost-types = "0.12"
ordered-float = "3.0"

[dev-dependencies]
drasi-bootstrap-kubernetes.workspace = true
drasi-reaction-application.workspace = true
env_logger = "0.10.0"
serial_test = "3.0"
testcontainers = "0.23"
testcontainers-modules = { version = "0.11", features = ["k3s"] }
tokio-test = "0.4"
tempfile = "3"

[features]
dynamic-plugin = []
