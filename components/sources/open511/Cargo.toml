[package]
name = "drasi-source-open511"
version = "0.1.0"
edition = "2021"
authors = ["Drasi Project"]
description = "Open511 polling source plugin for Drasi"
license = "Apache-2.0"
repository = "https://github.com/drasi-project/drasi-core"
keywords = ["drasi", "plugin", "source", "open511", "traffic"]
categories = ["network-programming"]

[lib]
crate-type = ["lib", "cdylib"]

[lints]
workspace = true

[dependencies]
drasi-lib.workspace = true
drasi-core.workspace = true
drasi-plugin-sdk = { workspace = true }
utoipa = { workspace = true }
anyhow = "1.0"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
ordered-float = "3.7.0"
reqwest = { version = "0.11", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
tracing = "0.1"

[dev-dependencies]
axum = "0.7"
drasi-bootstrap-open511 = { path = "../../bootstrappers/open511" }
drasi-reaction-application.workspace = true
env_logger = "0.11"
reqwest = { version = "0.11", features = ["json"] }
tokio-test = "0.4"

[features]
dynamic-plugin = []
