[package]
name = "drasi-source-kafka"
version = "0.1.2"
edition = "2021"
authors = ["Drasi Project"]
description = "Kafka source plugin for Drasi"
license = "Apache-2.0"
repository = "https://github.com/drasi-project/drasi-core"
keywords = ["drasi", "plugin", "kafka"]
categories = ["network-programming"]

[lib]
crate-type = ["lib", "cdylib"]

[lints]
workspace = true

[dependencies]
drasi-lib.workspace = true
drasi-core.workspace = true
drasi-plugin-sdk = { workspace = true }
drasi-source-mapping.workspace = true
utoipa = { workspace = true }
anyhow = "1.0"
async-trait = "0.1"
log = "0.4"
tracing = "0.1"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = "0.4"
bytes = "1"
rdkafka = "0.36"

[dev-dependencies]
tokio-test = "0.4"
drasi-reaction-application = { workspace = true }
env_logger = "0.11"
testcontainers = "0.27"
testcontainers-modules = { version = "0.15", features = ["kafka"] }
rdkafka = "0.36"
serde_json = "1.0"
drasi-source-mapping.workspace = true
drasi-bootstrap-kafka = { path = "../../bootstrappers/kafka" }

[features]
dynamic-plugin = []
