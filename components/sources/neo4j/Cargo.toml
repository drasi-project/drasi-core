[package]
name = "drasi-source-neo4j"
version = "0.1.0"
edition = "2021"
authors = ["Drasi Project"]
description = "Neo4j CDC source plugin for Drasi"
license = "Apache-2.0"
repository = "https://github.com/drasi-project/drasi-core"
keywords = ["drasi", "plugin", "neo4j", "cdc"]
categories = ["database"]

[lints]
workspace = true

[dependencies]
drasi-lib.workspace = true
drasi-core.workspace = true
anyhow = "1.0"
async-trait = "0.1"
chrono = "0.4"
log = "0.4"
ordered-float = "3.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
tracing = "0.1"
neo4rs = "0.8"

[dev-dependencies]
drasi-bootstrap-neo4j.workspace = true
drasi-reaction-application.workspace = true
env_logger = "0.10.0"
serial_test = "3.0"
testcontainers = "0.23"
tokio-test = "0.4"
uuid = { version = "1.0", features = ["v4"] }
