[package]
name = "drasi-source-mysql"
version = "0.2.5"
edition = "2021"
authors = ["Drasi Project"]
description = "MySQL source plugin for Drasi"
license = "Apache-2.0"
repository = "https://github.com/drasi-project/drasi-core"
keywords = ["drasi", "plugin", "mysql"]
categories = ["database"]

[lib]
crate-type = ["lib", "cdylib"]

[lints]
workspace = true

[dependencies]
drasi-lib.workspace = true
drasi-core.workspace = true
drasi-plugin-sdk = { workspace = true }
drasi-mysql-common = { workspace = true }
utoipa = { workspace = true }
anyhow = "1.0"
async-trait = "0.1"
log = "0.4"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
ordered-float = "3.0"
mysql_async = { version = "0.37", features = ["binlog"] }
# vendored OpenSSL: build from source so mysql_async's native-tls cross-compiles
# under cargo-zigbuild (glibc-pinned -gnu plugins) without host openssl headers.
openssl = { version = "0.10", features = ["vendored"] }
mysql_common = { version = "0.37", features = ["binlog"] }
futures-util = "0.3"
bytes = "1.0"

[features]
dynamic-plugin = []

[dev-dependencies]
tokio-test = "0.4"
testcontainers = "0.27"
testcontainers-modules = { version = "0.15", features = ["mysql"] }
drasi-reaction-application = { workspace = true }
drasi-bootstrap-mysql = { workspace = true }
drasi-index-rocksdb = { workspace = true }
env_logger = "0.11"
tempfile = "3"
