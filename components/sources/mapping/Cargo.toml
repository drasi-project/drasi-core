[package]
name = "drasi-source-mapping"
version = "0.1.1"
edition = "2021"
authors = ["Drasi Project"]
description = "Source payload mapping engine for Drasi - transforms arbitrary payloads into graph change events using Handlebars templates"
license = "Apache-2.0"
repository = "https://github.com/drasi-project/drasi-core"
keywords = ["drasi", "source", "mapping"]
categories = ["database"]

[lints]
workspace = true

[dependencies]
drasi-core.workspace = true
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
handlebars = "6"
chrono = "0.4"
ordered-float = "3.0"
regex = "1.10"
