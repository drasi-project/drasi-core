[package]
name = "drasi-bootstrap-kubernetes"
version = "0.1.0"
edition = "2021"
authors = ["Drasi Project"]
description = "Kubernetes bootstrap plugin for Drasi"
license = "Apache-2.0"
repository = "https://github.com/drasi-project/drasi-core"
keywords = ["drasi", "plugin", "bootstrap", "kubernetes"]
categories = ["database"]

[lib]
crate-type = ["lib", "cdylib"]

[lints]
workspace = true

[dependencies]
drasi-lib.workspace = true
drasi-core.workspace = true
drasi-plugin-sdk = { workspace = true }
drasi-source-kubernetes.workspace = true
utoipa = { workspace = true }
anyhow = "1.0"
async-trait = "0.1"
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
kube = { version = "0.98", features = ["client", "runtime", "derive"] }
k8s-openapi = { version = "0.24", features = ["v1_32"] }

[features]
dynamic-plugin = []
