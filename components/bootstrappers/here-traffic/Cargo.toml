[package]
name = "drasi-bootstrap-here-traffic"
version = "0.1.0"
edition = "2021"
authors = ["Drasi Project"]
description = "HERE Traffic API bootstrap provider for Drasi"
license = "Apache-2.0"
repository = "https://github.com/drasi-project/drasi-core"
keywords = ["drasi", "plugin", "bootstrap", "here", "traffic"]
categories = ["database"]

[lib]
crate-type = ["lib", "cdylib"]

[lints]
workspace = true

[dependencies]
drasi-core.workspace = true
drasi-lib.workspace = true
drasi-plugin-sdk.workspace = true
drasi-source-here-traffic = { path = "../../sources/here-traffic" }
utoipa.workspace = true
anyhow = "1.0"
async-trait = "0.1"
chrono = "0.4"
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }

[features]
dynamic-plugin = []
