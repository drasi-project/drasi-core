syntax = "proto3";

package drasi.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// Element reference that uniquely identifies an element
message ElementReference {
    string source_id = 1;
    string element_id = 2;
}

// Metadata for an element
message ElementMetadata {
    ElementReference reference = 1;
    repeated string labels = 2;
    uint64 effective_from = 3; // Unix timestamp in nanoseconds
}

// Node element
message Node {
    ElementMetadata metadata = 1;
    google.protobuf.Struct properties = 2;
}

// Relation element
message Relation {
    ElementMetadata metadata = 1;
    ElementReference in_node = 2;
    ElementReference out_node = 3;
    google.protobuf.Struct properties = 4;
}

// Element can be either a Node or a Relation
message Element {
    oneof element {
        Node node = 1;
        Relation relation = 2;
    }
}

// Source change types
enum ChangeType {
    CHANGE_TYPE_UNSPECIFIED = 0;
    CHANGE_TYPE_INSERT = 1;
    CHANGE_TYPE_UPDATE = 2;
    CHANGE_TYPE_DELETE = 3;
}

// Source change event
message SourceChange {
    ChangeType type = 1;
    oneof change {
        Element element = 2; // For insert/update
        ElementMetadata metadata = 3; // For delete
    }
    google.protobuf.Timestamp timestamp = 4;
    string source_id = 5;
}

// Type of change carried by a QueryResultItem (v3 schema).
//
// Replaces the v2 string `type` tag, eliminating the prior casing
// inconsistency between CRUD ops and aggregation/noop.
enum QueryResultItemType {
    QUERY_RESULT_ITEM_TYPE_UNSPECIFIED = 0;
    QUERY_RESULT_ITEM_TYPE_ADD         = 1;
    QUERY_RESULT_ITEM_TYPE_UPDATE      = 2;
    QUERY_RESULT_ITEM_TYPE_DELETE      = 3;
    QUERY_RESULT_ITEM_TYPE_AGGREGATION = 4;
    QUERY_RESULT_ITEM_TYPE_NOOP        = 5;
}

// Query result item (v3 schema).
//
// Field tags 1 and 2 (formerly `type` and `data`) are permanently
// reserved. `data` was removed because it duplicated `after`/`before`
// for ADD/UPDATE/DELETE; templated output now lands on the dedicated
// optional `payload` field below.
message QueryResultItem {
    reserved 1, 2;
    reserved "type", "data";

    // Raw row state, framework-controlled.
    // ADD          — only `after` set
    // DELETE       — only `before` set
    // UPDATE       — both set
    // AGGREGATION  — `after` set; `before` set if known
    // NOOP         — neither set
    google.protobuf.Struct before = 3;
    google.protobuf.Struct after  = 4;

    // Discriminator for the change type.
    QueryResultItemType item_type = 5;

    // Identity of the row across emissions. First-class on every item.
    uint64 row_signature = 6;

    // User-customizable payload. Populated only when an output template
    // is configured for the (query_id, operation) pair and renders to
    // valid JSON. Absent when no template is configured, when render
    // fails, or for AGGREGATION/NOOP (which bypass template rendering).
    optional google.protobuf.Struct payload = 7;
}

// Query result batch
message QueryResult {
    string query_id = 1;
    repeated QueryResultItem results = 2;
    google.protobuf.Timestamp timestamp = 3;
}

// Bootstrap request
message BootstrapRequest {
    string query_id = 1;
    repeated string node_labels = 2;
    repeated string relation_labels = 3;
}

// Bootstrap response
message BootstrapResponse {
    repeated Element elements = 1;
    uint32 total_count = 2;
}
