[package]
name = "drasi-reaction-sqs"
version = "0.1.0"
edition = "2021"
authors = ["Drasi Project"]
description = "AWS SQS reaction plugin for Drasi"
license = "Apache-2.0"
repository = "https://github.com/drasi-project/drasi-core"
keywords = ["drasi", "plugin", "reaction", "aws", "sqs"]
categories = ["network-programming"]

[lints]
workspace = true

[lib]
crate-type = ["lib", "cdylib"]

[dependencies]
drasi-lib.workspace = true
drasi-core.workspace = true
drasi-plugin-sdk = { workspace = true }
utoipa = { workspace = true }
anyhow = "1.0"
async-trait = "0.1"
aws-config = "0.56.1"
aws-sdk-sqs = "0.34.0"
aws-types = "0.56.1"
chrono = "0.4"
handlebars = "5.1"
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
uuid = { version = "1.0", features = ["v4"] }

[dev-dependencies]
drasi-source-application.workspace = true
env_logger = "0.11"
testcontainers = "0.23"
testcontainers-modules = { version = "0.11", features = ["elasticmq"] }

[features]
dynamic-plugin = []
