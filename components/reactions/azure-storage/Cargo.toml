[package]
name = "drasi-reaction-azure-storage"
version = "0.1.0"
edition = "2021"
authors = ["Drasi Project"]
description = "Azure Storage reaction plugin for Drasi (Blob, Queue, Table)"
license = "Apache-2.0"
repository = "https://github.com/drasi-project/drasi-core"
keywords = ["drasi", "plugin", "reaction", "azure", "storage"]
categories = ["network-programming"]

[lints]
workspace = true

[lib]
crate-type = ["lib", "cdylib"]

[dependencies]
drasi-lib.workspace = true
drasi-core.workspace = true
drasi-plugin-sdk = { workspace = true }
utoipa = { workspace = true }
anyhow = "1.0"
async-trait = "0.1"
chrono = "0.4"
futures = "0.3"
handlebars = "5.1"
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
azure_core = "0.21"
azure_storage = "0.21"
azure_storage_blobs = "0.21"
azure_storage_queues = "0.21"
azure_data_tables = "0.21"

[dev-dependencies]
drasi-source-application = { path = "../../sources/application" }
env_logger = "0.10.0"
serial_test = "3.0"
testcontainers = "0.23"
tokio-test = "0.4"

[features]
dynamic-plugin = []
