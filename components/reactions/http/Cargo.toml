[package]
name = "drasi-reaction-http"
version = "0.3.0"
edition = "2021"
authors = ["Drasi Project"]
description = "HTTP reaction plugin for Drasi (single per-result notifications and adaptive batched delivery)"
license = "Apache-2.0"
repository = "https://github.com/drasi-project/drasi-core"
keywords = ["drasi", "plugin", "reaction", "http", "adaptive"]
categories = ["network-programming"]

[lints]
workspace = true

[lib]
crate-type = ["lib", "cdylib"]

[dependencies]
# TODO(#574): For standalone reaction-plugin packaging, depend on published
# crates.io versions instead of workspace-inherited drasi crates. This remains
# intentionally uncompliant for now so the in-repo reaction can build against
# local drasi-core/drasi-lib changes while it lives in this workspace.
drasi-lib.workspace = true
anyhow = "1.0"
async-trait = "0.1"
log = "0.4"
handlebars = "5.1"
reqwest = { version = "0.11", features = ["json", "stream"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
chrono = "0.4"
# TODO(#574): Pin the same crates.io drasi-plugin-sdk version as the target
# dynamic plugin loader before treating this crate as standalone.
drasi-plugin-sdk = { workspace = true }
utoipa = { workspace = true }

[dev-dependencies]
# TODO(#574): Revisit this test-only workspace dependency when the HTTP
# reaction is made buildable outside the drasi-core workspace.
drasi-core.workspace = true
wiremock = "0.6"
tokio = { version = "1.0", features = ["full", "test-util"] }
env_logger = "0.11"

[features]
# default = []
dynamic-plugin = []
