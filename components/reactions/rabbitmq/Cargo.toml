[package]
name = "drasi-reaction-rabbitmq"
version = "0.1.0"
edition = "2021"
authors = ["Drasi Project"]
description = "RabbitMQ reaction plugin for Drasi"
license = "Apache-2.0"
repository = "https://github.com/drasi-project/drasi-core"
keywords = ["drasi", "plugin", "reaction", "rabbitmq"]
categories = ["network-programming"]

[lints]
workspace = true

[lib]
crate-type = ["lib", "cdylib"]

[dependencies]
drasi-lib.workspace = true
drasi-core.workspace = true
drasi-plugin-sdk.workspace = true
utoipa.workspace = true
anyhow = "1.0"
async-trait = "0.1"
chrono = "0.4"
handlebars = "5.1"
lapin = "2.5"
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }

[dev-dependencies]
drasi-source-application = { path = "../../../components/sources/application" }
env_logger = "0.11"
futures-util = "0.3"
testcontainers = "0.23"

[features]
dynamic-plugin = []
