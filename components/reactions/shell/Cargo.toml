[package]
name = "drasi-reaction-shell"
version = "0.1.0"
edition = "2021"
authors = ["Drasi Project"]
description = "Shell reaction plugin for Drasi"
license = "Apache-2.0"
repository = "https://github.com/drasi-project/drasi-core"
keywords = ["drasi", "plugin", "reaction", "shell"]
categories = ["linux-programming"]

[lints]
workspace = true

[lib]
crate-type = ["lib", "cdylib"]

[dependencies]
drasi-lib.workspace = true
drasi-core.workspace = true
anyhow = "1.0"
async-trait = "0.1"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
log = "0.4"
tokio-util = { version = "0.7" }
handlebars = "5.1"
libc = "0.2.186"
nix = { version = "0.31.2", features = ["process", "user", "fs"] }
chrono = "0.4"
drasi-plugin-sdk = { workspace = true }
utoipa = { workspace = true }
regex = "1.12.3"

[dev-dependencies]
drasi-source-http = { path = "../../sources/http"}
env_logger = "0.11"
uuid = { version = "1.0", features = ["v4", "serde"] }
tokio-test = "0.4"
serial_test = "3.0"
reqwest = { version = "0.11", features = ["json"] }

[features]
dynamic-plugin = []
