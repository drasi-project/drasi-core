[package]
name = "open511-getting-started"
version = "0.1.0"
edition = "2021"
publish = false
description = "DrasiLib example using Open511 source and bootstrap providers"

[workspace]

[dependencies]
anyhow = "1.0"
drasi-bootstrap-open511 = { path = "../../../components/bootstrappers/open511" }
drasi-lib = { path = "../../../lib" }
drasi-reaction-log = { path = "../../../components/reactions/log" }
drasi-source-open511 = { path = "../../../components/sources/open511" }
env_logger = "0.11"
tokio = { version = "1.6", features = ["full"] }

[[bin]]
name = "open511-getting-started"
path = "main.rs"
