[package]
name = "cloudflare-radar-dashboard"
version = "0.1.0"
edition = "2021"
publish = false
description = "DrasiLib example for Cloudflare Radar source"

[workspace]

[dependencies]
drasi-lib = { path = "../../../lib" }
drasi-source-cloudflare-radar = { path = "../../../components/sources/cloudflare-radar" }
drasi-bootstrap-cloudflare-radar = { path = "../../../components/bootstrappers/cloudflare-radar" }
drasi-reaction-log = { path = "../../../components/reactions/log" }

tokio = { version = "1.6", features = ["full"] }
anyhow = "1.0"
axum = "0.7"
env_logger = "0.10.0"
log = "0.4"
serde_json = "1.0"

[[bin]]
name = "cloudflare-radar-dashboard"
path = "main.rs"
