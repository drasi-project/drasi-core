[package]
name = "here-traffic-getting-started"
version = "0.1.0"
edition = "2021"
publish = false
description = "HERE Traffic real-time dashboard example"

# Keep this crate independent from the parent workspace
[workspace]

[dependencies]
drasi-lib = { path = "../../../lib" }
drasi-source-here-traffic = { path = "../../../components/sources/here-traffic" }
drasi-bootstrap-here-traffic = { path = "../../../components/bootstrappers/here-traffic" }
drasi-reaction-application = { path = "../../../components/reactions/application" }

tokio = { version = "1", features = ["full"] }
anyhow = "1"
chrono = "0.4"
serde_json = "1"
ratatui = "0.28"
crossterm = "0.28"

[[bin]]
name = "here-traffic-getting-started"
path = "main.rs"
