[package]
name = "ris-live-getting-started"
version = "0.1.0"
edition = "2021"
publish = false
description = "DrasiLib getting-started example with a live web dashboard for RIPE NCC RIS Live BGP data"

[workspace]

[dependencies]
drasi-lib = { path = "../../../lib" }
drasi-source-ris-live = { path = "../../../components/sources/ris-live" }
drasi-reaction-application = { path = "../../../components/reactions/application" }

tokio = { version = "1.6", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"] }
anyhow = "1.0"
env_logger = "0.10.0"
log = "0.4"
axum = { version = "0.7" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = "0.4"

[[bin]]
name = "ris-live-getting-started"
path = "main.rs"
