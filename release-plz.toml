# release-plz configuration for independent versioning
# See: https://release-plz.ieni.dev/docs/config

[workspace]
# Changelog configuration
changelog_config = "cliff.toml"
allow_dirty = false

# Git release settings
git_release_enable = true
git_release_type = "prod"

# Publishing settings
publish = true
# Skip the isolated `cargo publish` verification build. That build re-resolves
# the crate's full dependency graph (including dev-dependencies) from crates.io.
# release-plz orders publishing by [dependencies]/[build-dependencies] only and
# ignores [dev-dependencies] (they may form cycles), so a crate can be published
# before an internal crate it only dev-depends on has landed on crates.io,
# causing the verify build to fail with "no matching version". The whole
# workspace is already built and tested in CI on every PR, so this verify step
# is redundant. Matches `cargo publish --no-verify` used in publish-crate.yml.
publish_no_verify = true

# PR settings
pr_labels = ["release"]

# Dependencies updates
dependencies_update = true

# Unpublished/internal packages - exclude from releases
[[package]]
name = "shared-tests"
publish = false
changelog_update = false
git_release_enable = false
release = false

[[package]]
name = "query-perf"
publish = false
changelog_update = false
git_release_enable = false
release = false

[[package]]
name = "examples"
publish = false
changelog_update = false
git_release_enable = false
release = false

# Temporarily excluded due to rustc 1.91+ requirement in transitive AWS SDK dependencies
# TODO: Update AWS SDK versions when compatible versions are available
[[package]]
name = "drasi-reaction-aws-sqs"
publish = false
changelog_update = false
git_release_enable = false
release = false
