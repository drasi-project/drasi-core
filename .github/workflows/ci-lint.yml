name: Rust Lint

on:
  pull_request:
    branches:
      - main
      - feature/*
      - feature-lib
      - release/*

permissions:
  contents: read

jobs:
  lint:
    uses: drasi-project/.github/.github/workflows/rust-lint.yaml@main
    with:
      install-jq: true
      clippy-command: >-
        cargo clippy --workspace --all-targets
        --features "drasi-middleware/all,drasi-host-sdk/registry,drasi-host-sdk/fetcher,drasi-host-sdk/watcher,drasi-lib/middleware-jq"
