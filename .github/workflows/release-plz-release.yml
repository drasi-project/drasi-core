name: Release-plz publish

# Part 2 of the release process.
#
# On every push to `main`, this workflow runs `release-plz release`, which
# publishes to crates.io every workspace crate whose current version is not yet
# on the registry, then creates the matching git tags and GitHub releases.
#
# `release-plz release` is idempotent: it queries crates.io and only publishes
# the packages that are missing, in dependency order. This means:
#   * On a normal commit (nothing new to release) it does nothing.
#   * When the release PR from `release-plz-pr.yml` is merged, the bumped
#     versions are unpublished, so they get published here.
#   * If a previous run failed part-way through, simply re-running this workflow
#     (push another commit, or trigger it manually via "Run workflow") resumes
#     publishing only the still-missing crates. No special "force" flag needed.
#
# Use the `workflow_dispatch` trigger to recover from a partially-failed release.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

# Only one publish run at a time, and never cancel one mid-flight: cancelling
# while crates are being pushed to crates.io is what leaves releases in an
# inconsistent state.
concurrency:
  group: release-plz-release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  # Use the sparse registry protocol so newly published crates are visible to
  # dependent crates almost immediately, reducing "package not found" failures
  # when publishing several inter-dependent crates in one run.
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  release:
    name: Publish to crates.io
    runs-on: ubuntu-latest-8-cores
    environment: drasi-core-release
    # Don't run on forks.
    if: ${{ github.repository_owner == 'drasi-project' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq libjq-dev protobuf-compiler

      - name: Set JQ_LIB_DIR
        run: echo "JQ_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV

      - name: Install Rust toolchain
        run: rustup show

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install release-plz
        run: |
          curl -sSfL https://github.com/release-plz/release-plz/releases/download/release-plz-v0.3.157/release-plz-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin

      - name: Install cargo-semver-checks
        run: |
          curl -sSfL https://github.com/obi1kenobi/cargo-semver-checks/releases/download/v0.45.0/cargo-semver-checks-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin
          cargo-semver-checks --version

      # Drop any stale registry index so release-plz sees the current published
      # state of crates.io and doesn't try to republish an already-published
      # version (a common cause of failed re-runs).
      - name: Clear cargo registry index cache
        run: rm -rf ~/.cargo/registry/index/github.com-*/ ~/.cargo/registry/index/index.crates.io-* || true

      - name: Publish unpublished crates
        run: release-plz release --git-token "$GITHUB_TOKEN" --backend github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
