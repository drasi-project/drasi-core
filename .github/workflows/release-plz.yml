name: Release-plz

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (no publishing)'
        required: false
        type: boolean
        default: false
      force_publish:
        description: 'Force publish crates (use after failed release)'
        required: false
        type: boolean
        default: false

permissions:
  pull-requests: write
  contents: write
  # Required so the downstream publish-plugins job (called via workflow_call)
  # can push OCI images and use cosign keyless signing. A called workflow's
  # GITHUB_TOKEN cannot exceed the caller's permissions, so they must be granted
  # here even though release-plz itself does not use them.
  packages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest-8-cores
    environment: drasi-core-release
    outputs:
      # 'true' only when this run actually published crates (release commit or
      # force_publish, and not a dry run). Gates the downstream publish-plugins job.
      published: ${{ steps.publish_result.outputs.published }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install release tools
        uses: ./.github/actions/install-release-tools

      # Check if this commit is from a release PR (commit message starts with "chore: release" or similar)
      - name: Check if release commit
        id: check_release
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qE "^chore\(release\)|^chore: release|^release:"; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "This is a release commit - will publish crates"
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "This is a regular commit - will create/update release PR"
          fi

      # On regular commits: Create/update release PR with version bumps and changelog
      - name: Create/update release PR
        if: ${{ steps.check_release.outputs.is_release != 'true' && inputs.dry_run != true && inputs.force_publish != true }}
        run: release-plz release-pr --git-token "$GITHUB_TOKEN" --backend github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # On release PR merge OR force_publish: Publish crates to crates.io and create git tags
      - name: Clear cargo registry index cache
        if: ${{ (steps.check_release.outputs.is_release == 'true' || inputs.force_publish == true) && inputs.dry_run != true }}
        run: rm -rf ~/.cargo/registry/index/github.com-*/ || true

      - name: Publish crates
        if: ${{ (steps.check_release.outputs.is_release == 'true' || inputs.force_publish == true) && inputs.dry_run != true }}
        run: release-plz release --git-token "$GITHUB_TOKEN" --backend github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Runs only after a successful publish (same condition as above, and this
      # step is reached only if 'Publish crates' did not fail). Its output gates
      # the downstream publish-plugins job.
      - name: Mark published
        id: publish_result
        if: ${{ (steps.check_release.outputs.is_release == 'true' || inputs.force_publish == true) && inputs.dry_run != true }}
        run: echo "published=true" >> "$GITHUB_OUTPUT"

      # Dry run mode - preview what would happen
      - name: Dry run - preview version bumps
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "=== Preview: Version bumps and changelog updates ==="
          echo ""
          release-plz update
          echo ""
          echo "=== Dry run complete ==="
          echo "The above shows what versions would be bumped and changelog entries created."
          echo "To create a release PR, run this workflow with dry_run=false."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # After a successful crate publish, build and publish the plugin OCI images so
  # the crates on crates.io and the plugin images in GHCR stay in lockstep for a
  # release. Skipped for release-PR-creation commits and dry runs (published != 'true').
  publish-plugins:
    name: Publish plugins
    needs: release-plz
    if: ${{ needs.release-plz.outputs.published == 'true' }}
    uses: ./.github/workflows/publish-plugins.yml
    with:
      sign: true
      dry_run: false
    secrets: inherit