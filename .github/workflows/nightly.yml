name: Nightly E2E (Producer)

# Producer half of the end-to-end nightly pipeline. Runs in drasi-core because
# this is where the change under test originates. It:
#   1. resolves the current main HEAD SHA (the "nightly" version of the crates),
#   2. triggers the release-plz dry-run for release-health signal,
#   3. publishes the plugins to a fixed, overwritable OCI tag via workflow_call,
#   4. dispatches the SHA + plugin tag to drasi-server to run the consumer e2e.
#
# The SHA and the plugin images both come from the same workflow run (same main
# commit), so the crate patch overlay and the OCI plugins the server pulls are
# always consistent.
#
# See docs/nightly-e2e/README.md for the full design.

on:
  schedule:
    # 08:00 UTC daily. Runs against the default branch (main).
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      plugin_tag:
        description: 'Fixed OCI tag for nightly plugins'
        required: false
        type: string
        default: 'drasi-nightly-test'
      skip_release_health:
        description: 'Skip the release-plz dry-run health check'
        required: false
        type: boolean
        default: false
      skip_dispatch:
        description: 'Skip dispatching the drasi-server e2e (build/publish only)'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - drasi-e2e-nightly

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: nightly-e2e-producer
  cancel-in-progress: false

jobs:
  resolve-sha:
    name: Resolve main SHA
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.rev.outputs.sha }}
      plugin_tag: ${{ steps.rev.outputs.plugin_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Always pin the nightly to main's HEAD, regardless of the ref this
          # workflow was dispatched from.
          ref: main
          fetch-depth: 0

      - name: Resolve HEAD SHA and plugin tag
        id: rev
        run: |
          SHA=$(git rev-parse HEAD)
          TAG='${{ inputs.plugin_tag || 'drasi-nightly-test' }}'
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "plugin_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Nightly core SHA: $SHA"
          echo "Nightly plugin tag: $TAG"

  release-health:
    name: Release health (release-plz dry-run)
    if: ${{ inputs.skip_release_health != true }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # Run the release-plz dry-run INLINE (mirroring release-plz.yml's setup and
      # its dry-run step) so a failure fails this job and the whole nightly. This
      # is the early-warning signal that the real release would break. We do not
      # publish anything here.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq libjq-dev protobuf-compiler

      - name: Set JQ_LIB_DIR
        run: echo "JQ_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV

      - name: Install Rust toolchain
        run: rustup show

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install release-plz
        run: |
          curl -sSfL https://github.com/release-plz/release-plz/releases/download/release-plz-v0.3.157/release-plz-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin

      - name: Install cargo-semver-checks
        run: |
          curl -sSfL https://github.com/obi1kenobi/cargo-semver-checks/releases/download/v0.45.0/cargo-semver-checks-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin
          cargo-semver-checks --version

      - name: Release-plz dry-run (fails the nightly if the release would break)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== release-plz update (dry-run: version bumps, changelog, semver checks) ==="
          release-plz update
          echo "=== release-plz dry-run passed ==="


  publish-plugins:
    name: Publish nightly plugins
    needs: resolve-sha
    uses: ./.github/workflows/publish-plugins.yml
    with:
      tag: ${{ needs.resolve-sha.outputs.plugin_tag }}
      # Nightly -test channel: skip cosign signing to avoid orphaned signatures
      # on each tag overwrite.
      sign: false
      dry_run: false
    secrets: inherit

  # Call drasi-server's nightly-e2e reusable workflow directly. Using a reusable
  # workflow call (instead of repository_dispatch) means:
  #   - no PAT needed (GITHUB_TOKEN is used across the org),
  #   - a real needs: ordering edge (runs only after plugins are published),
  #   - the e2e result surfaces inside this drasi-core run.
  # The @ref pins which version of the consumer runs; point it at the branch while
  # testing, then switch to @main once merged. server_ref tells the consumer which
  # drasi-server ref to check out (required because a cross-repo call runs in this
  # caller's context).
  call-server-e2e:
    name: drasi-server e2e
    needs: [resolve-sha, publish-plugins]
    if: ${{ inputs.skip_dispatch != true }}
    uses: drasi-project/drasi-server/.github/workflows/nightly-e2e.yml@drasi-e2e-nightly
    with:
      core_sha: ${{ needs.resolve-sha.outputs.sha }}
      plugin_tag: ${{ needs.resolve-sha.outputs.plugin_tag }}
      registry: ghcr.io/drasi-project
      server_repo: drasi-project/drasi-server
      server_ref: drasi-e2e-nightly
    secrets: inherit
