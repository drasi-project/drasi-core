name: Nightly E2E (Producer)

# Producer half of the end-to-end nightly pipeline. Runs in drasi-core because
# this is where the change under test originates. It:
#   1. resolves the current main HEAD SHA (the "nightly" version of the crates),
#   2. triggers the release-plz dry-run for release-health signal,
#   3. publishes the plugins to a fixed, overwritable OCI tag via workflow_call,
#   4. dispatches the SHA + plugin tag to drasi-server to run the consumer e2e.
#
# The SHA and the plugin images both come from the same workflow run (same main
# commit), so the crate patch overlay and the OCI plugins the server pulls are
# always consistent.
#
# See docs/nightly-e2e/README.md for the full design.

on:
  schedule:
    # 14:00 UTC daily = 06:00 PST. GitHub cron is UTC and does not observe DST,
    # so during PDT (summer) this fires at 07:00 local. Runs against main.
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      plugin_tag:
        description: 'Fixed OCI tag for nightly plugins'
        required: false
        type: string
        default: 'drasi-nightly-test'
      skip_release_health:
        description: 'Skip the release-plz dry-run health check'
        required: false
        type: boolean
        default: false
      skip_dispatch:
        description: 'Skip dispatching the drasi-server e2e (build/publish only)'
        required: false
        type: boolean
        default: false
      skip_publish_plugins:
        description: 'Skip publishing plugins (reuse already-published nightly tag)'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - drasi-e2e-nightly

permissions:
  # contents: write + pull-requests: write are required because the release-health
  # job calls release-plz.yml, which declares those permissions. A called workflow
  # cannot exceed the caller's grants, so they must be set here even though the
  # nightly runs release-plz in dry-run mode (no writes actually happen).
  contents: write
  pull-requests: write
  packages: write
  id-token: write

concurrency:
  group: nightly-e2e-producer
  cancel-in-progress: false

jobs:
  resolve-sha:
    name: Resolve main SHA
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.rev.outputs.sha }}
      plugin_tag: ${{ steps.rev.outputs.plugin_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # Always pin the nightly to main's HEAD, regardless of the ref this
          # workflow was dispatched from.
          ref: main
          fetch-depth: 0

      - name: Resolve HEAD SHA and plugin tag
        id: rev
        run: |
          SHA=$(git rev-parse HEAD)
          TAG='${{ inputs.plugin_tag || 'drasi-nightly-test' }}'
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "plugin_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Nightly core SHA: $SHA"
          echo "Nightly plugin tag: $TAG"

  # Release-health signal: run the real release-plz workflow in dry-run mode. This
  # calls release-plz.yml directly (rather than duplicating its setup inline) so
  # the pinned release-plz / cargo-semver-checks versions live in exactly one
  # place. dry_run=true gates off every publish step, leaving only the
  # `release-plz update` preview — a failure here fails the nightly.
  release-health:
    name: Release health (release-plz dry-run)
    if: ${{ inputs.skip_release_health != true }}
    uses: ./.github/workflows/release-plz.yml
    with:
      dry_run: true
    secrets: inherit


  publish-plugins:
    name: Publish nightly plugins
    needs: resolve-sha
    # Skip when requested via the workflow_dispatch input, or (for push-triggered
    # runs, which cannot pass inputs) when the commit message contains
    # [skip-plugins]. Lets you reuse an already-published nightly tag to cut build time.
    if: ${{ inputs.skip_publish_plugins != true && !contains(github.event.head_commit.message, '[skip-plugins]') }}
    uses: ./.github/workflows/publish-plugins.yml
    with:
      tag: ${{ needs.resolve-sha.outputs.plugin_tag }}
      # Nightly -test channel: skip cosign signing to avoid orphaned signatures
      # on each tag overwrite.
      sign: false
      dry_run: false
      # Nightly test packages are already pullable; skip the org-admin visibility
      # step (it needs a token that can administer org package visibility).
      skip_visibility: true
    secrets: inherit

  # Call drasi-server's nightly-e2e reusable workflow directly. Using a reusable
  # workflow call (instead of repository_dispatch) means:
  #   - no PAT needed (GITHUB_TOKEN is used across the org),
  #   - a real needs: ordering edge (runs only after plugins are published),
  #   - the e2e result surfaces inside this drasi-core run.
  # The @ref pins which version of the consumer runs; point it at the branch while
  # testing, then switch to @main once merged. server_ref tells the consumer which
  # drasi-server ref to check out (required because a cross-repo call runs in this
  # caller's context).
  call-server-e2e:
    name: drasi-server e2e
    needs: [resolve-sha, publish-plugins]
    # Run when resolve-sha succeeded and publish-plugins did not fail. Using
    # always() + result checks so a *skipped* publish-plugins (e.g. [skip-plugins])
    # still lets the e2e run against the already-published tag.
    if: ${{ always() && inputs.skip_dispatch != true && needs.resolve-sha.result == 'success' && needs.publish-plugins.result != 'failure' && needs.publish-plugins.result != 'cancelled' }}
    uses: drasi-project/drasi-server/.github/workflows/nightly-e2e.yml@drasi-e2e-nightly
    with:
      core_sha: ${{ needs.resolve-sha.outputs.sha }}
      plugin_tag: ${{ needs.resolve-sha.outputs.plugin_tag }}
      registry: ghcr.io/drasi-project
      server_repo: drasi-project/drasi-server
      server_ref: drasi-e2e-nightly
    secrets: inherit
