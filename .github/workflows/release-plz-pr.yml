name: Release-plz PR

# Part 1 of the release process.
#
# On every push to `main`, this workflow runs `release-plz release-pr`, which
# opens (or updates) a single "release" pull request that bumps the versions in
# the workspace `Cargo.toml` files and updates the changelogs for any crates
# with unreleased changes.
#
# It NEVER publishes to crates.io. Publishing is handled by the separate
# `release-plz-release.yml` workflow once this PR is merged.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

# Only one release-PR run at a time. Never cancel an in-flight run, otherwise we
# could leave the release PR in a half-updated state.
concurrency:
  group: release-plz-pr
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release-pr:
    name: Create / update release PR
    runs-on: ubuntu-latest-8-cores
    environment: drasi-core-release
    # Don't run on forks.
    if: ${{ github.repository_owner == 'drasi-project' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq libjq-dev protobuf-compiler

      - name: Set JQ_LIB_DIR
        run: echo "JQ_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV

      - name: Install Rust toolchain
        run: rustup show

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install release-plz
        run: |
          curl -sSfL https://github.com/release-plz/release-plz/releases/download/release-plz-v0.3.157/release-plz-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin

      - name: Install cargo-semver-checks
        run: |
          curl -sSfL https://github.com/obi1kenobi/cargo-semver-checks/releases/download/v0.45.0/cargo-semver-checks-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin
          cargo-semver-checks --version

      - name: Create / update release PR
        run: release-plz release-pr --git-token "$GITHUB_TOKEN" --backend github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
