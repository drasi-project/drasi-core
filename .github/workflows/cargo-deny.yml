name: Cargo Deny

on:
  pull_request:
    branches:
      - main
      - feature/*
      - feature-lib
      - release/*
  schedule:
    - cron: '30 1 * * 1' # runs every Monday at 01:30 UTC

permissions:
  contents: read

jobs:
  # Enforce the cross-cdylib shared-System-allocator contract: no crate in the
  # workspace may pull in a custom global allocator (jemalloc, mimalloc, etc.).
  # See deny.toml and https://github.com/drasi-project/drasi-core/issues/378.
  # RustSec advisory scanning is handled separately by cargo-audit.yml, so this
  # workflow runs only the `bans` check.
  bans:
    name: cargo-deny bans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: cargo-deny check bans
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe  # v2.0.20
        with:
          command: check bans

      # cargo-deny only sees crates in the dependency graph. This complementary check
      # catches a custom allocator declared directly in workspace source — a vector
      # cargo-deny cannot observe. Comment/doc-comment mentions (lines starting with //)
      # are excluded so prose references to `#[global_allocator]` don't trip the gate.
      - name: Reject custom #[global_allocator] in workspace source
        run: |
          matches="$(grep -rn --include='*.rs' --exclude-dir=target \
            '#\[global_allocator\]' . || true)"
          offenders="$(printf '%s\n' "$matches" \
            | grep -vE '^[^:]+:[0-9]+:[[:space:]]*//' || true)"
          if [ -n "$offenders" ]; then
            echo "::error::A custom #[global_allocator] was found in workspace source. Plugins and the host must share the default System allocator — see deny.toml and https://github.com/drasi-project/drasi-core/issues/378."
            printf '%s\n' "$offenders"
            exit 1
          fi
