name: Publish Plugins

on:
  workflow_dispatch:
    inputs:
      pre_release:
        description: 'Pre-release label (e.g., "dev.1", "rc.1"). Leave empty for stable release.'
        required: false
        type: string
        default: ''
      tag:
        description: 'Fixed tag override (e.g. "drasi-nightly-test"). When set, overrides pre_release.'
        required: false
        type: string
        default: ''
      registry:
        description: 'OCI registry to publish to'
        required: false
        type: string
        default: 'ghcr.io/drasi-project'
      sign:
        description: 'Sign published plugins with cosign'
        required: false
        type: boolean
        default: true
      dry_run:
        description: 'Dry run only (no publishing)'
        required: false
        type: boolean
        default: false
      skip_visibility:
        description: 'Skip the set-public-visibility step (e.g. for nightly test runs)'
        required: false
        type: boolean
        default: false
      ref:
        description: 'Git ref/SHA to check out and build (default: the triggering ref)'
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      pre_release:
        description: 'Pre-release label (e.g., "dev.1", "rc.1"). Leave empty for stable release.'
        required: false
        type: string
        default: ''
      tag:
        description: 'Fixed tag override (e.g. "drasi-nightly-test"). When set, overrides pre_release.'
        required: false
        type: string
        default: ''
      registry:
        description: 'OCI registry to publish to'
        required: false
        type: string
        default: 'ghcr.io/drasi-project'
      sign:
        description: 'Sign published plugins with cosign'
        required: false
        type: boolean
        default: true
      dry_run:
        description: 'Dry run only (no publishing)'
        required: false
        type: boolean
        default: false
      skip_visibility:
        description: 'Skip the set-public-visibility step (e.g. for nightly test runs)'
        required: false
        type: boolean
        default: false
      ref:
        description: 'Git ref/SHA to check out and build (default: the triggering ref)'
        required: false
        type: string
        default: ''

permissions:
  packages: write
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-publish:
    name: Build & Publish (${{ matrix.arch_suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest-8-cores
            arch_suffix: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            arch_suffix: linux-arm64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest-8-cores
            arch_suffix: linux-musl-amd64
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest-8-cores
            arch_suffix: linux-musl-arm64
            cross: true
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest-8-cores
            arch_suffix: windows-amd64
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            arch_suffix: windows-msvc-amd64
          - target: x86_64-apple-darwin
            os: macos-latest
            arch_suffix: darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            arch_suffix: darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          # Empty ref falls back to the triggering ref (release-plz / manual runs).
          # The nightly passes the resolved main SHA so plugins are built from the
          # same commit as the resolved nightly SHA.
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          # The Microsoft apt repos preinstalled on GitHub runners intermittently
          # serve a broken InRelease signature (NOSPLIT), failing apt-get update.
          # We don't use them, so remove before updating.
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/azure-cli.sources 2>/dev/null || true
          sudo apt-get update
          # libcurl4-openssl-dev: the native librdkafka build (used by the Kafka
          # bootstrap/source plugins) detects the host's curl/openssl on the
          # native linux-gnu runners (amd64 and arm64) and enables
          # WITH_OAUTHBEARER_OIDC, which #include <curl/curl.h>. The cross targets
          # (musl, windows-gnu) build in a sysroot without curl/openssl so they
          # don't need this.
          sudo apt-get install -y jq libjq-dev protobuf-compiler cmake libcurl4-openssl-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install jq protobuf cmake

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install protoc -y
          choco install cmake -y --installargs 'ADD_CMAKE_TO_PATH=System'
          vcpkg install openssl:x64-windows-static-md
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          echo "OPENSSL_DIR=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV

      - name: Set JQ_LIB_DIR (Linux)
        if: runner.os == 'Linux'
        # $(uname -m) is x86_64 on amd64 runners and aarch64 on arm64 runners,
        # which matches the Debian multiarch lib path on both.
        run: echo "JQ_LIB_DIR=/usr/lib/$(uname -m)-linux-gnu" >> $GITHUB_ENV

      - name: Set JQ_LIB_DIR (macOS)
        if: runner.os == 'macOS'
        run: echo "JQ_LIB_DIR=$(brew --prefix jq)/lib" >> $GITHUB_ENV

      - name: Install Rust toolchain
        run: rustup show

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --tag v0.2.4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to GHCR
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: echo "${{ secrets.GITHUB_TOKEN }}" | cosign login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build plugins
        run: cargo run -p xtask -- build-plugins --release --target ${{ matrix.target }}

      - name: Publish plugins (per-architecture tag)
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          OCI_REGISTRY_USERNAME: ${{ github.actor }}
          OCI_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="--release --target ${{ matrix.target }} --registry ${{ inputs.registry }} --arch-suffix ${{ matrix.arch_suffix }}"
          if [ "${{ inputs.sign }}" = "true" ]; then
            ARGS="$ARGS --sign"
          fi
          # --tag and --pre-release are mutually exclusive; --tag wins when set.
          if [ -n "${{ inputs.tag }}" ]; then
            ARGS="$ARGS --tag ${{ inputs.tag }}"
          elif [ -n "${{ inputs.pre_release }}" ]; then
            ARGS="$ARGS --pre-release ${{ inputs.pre_release }}"
          fi
          cargo run -p xtask -- publish-plugins $ARGS

      - name: Publish plugins (dry run)
        if: ${{ inputs.dry_run }}
        shell: bash
        run: |
          ARGS="--release --target ${{ matrix.target }} --registry ${{ inputs.registry }} --arch-suffix ${{ matrix.arch_suffix }} --dry-run"
          if [ -n "${{ inputs.tag }}" ]; then
            ARGS="$ARGS --tag ${{ inputs.tag }}"
          elif [ -n "${{ inputs.pre_release }}" ]; then
            ARGS="$ARGS --pre-release ${{ inputs.pre_release }}"
          fi
          cargo run -p xtask -- publish-plugins $ARGS

  set-public-visibility:
    name: Set Package Visibility to Public
    needs: build-and-publish
    # Skipped on dry runs and when skip_visibility is set (e.g. nightly test runs,
    # where the packages are already pullable and org-admin visibility isn't needed).
    if: ${{ !inputs.dry_run && !inputs.skip_visibility }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          # The Microsoft apt repos preinstalled on GitHub runners intermittently
          # serve a broken InRelease signature (NOSPLIT), failing apt-get update.
          # We don't use them, so remove before updating.
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/azure-cli.sources 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y jq libjq-dev protobuf-compiler

      - name: Set JQ_LIB_DIR
        run: echo "JQ_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV

      - name: Install Rust toolchain
        run: rustup show

      - name: Set packages to public
        env:
          # The default GITHUB_TOKEN cannot administer org-level container
          # package visibility (those endpoints return 404). A PAT (classic)
          # with write:packages, or a GitHub App token with org packages:write,
          # is required. Configure a PACKAGES_ADMIN_TOKEN secret; we fall back
          # to GITHUB_TOKEN only so the step doesn't fail to start.
          GH_TOKEN: ${{ secrets.PACKAGES_ADMIN_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ORG="drasi-project"

          FAILED=0

          set_public() {
            local pkg="$1"
            local encoded
            encoded=$(printf '%s' "$pkg" | sed 's|/|%2F|g')
            echo "Setting ${ORG}/${pkg} to public..."
            if ! gh api --method PATCH \
              "/orgs/${ORG}/packages/container/${encoded}" \
              -f visibility=public; then
              echo "::error::Failed to set ${ORG}/${pkg} to public"
              FAILED=1
            fi
          }

          # Set plugin directory to public
          set_public "drasi-plugin-directory"

          # Set each plugin package to public. list-plugins prints plugin lines
          # as "  <type>/<kind> v<version> (<path>)"; match only those so the
          # indented "SDK: ..." summary line is excluded.
          PLUGINS=$(cargo run -p xtask -- list-plugins \
            | { grep -E '^[[:space:]]+[a-z-]+/[^[:space:]]+ v[0-9]' || true; } \
            | awk '{print $1}')
          for PLUGIN in $PLUGINS; do
            set_public "$PLUGIN"
          done

          if [ "$FAILED" -ne 0 ]; then
            echo "::error::One or more packages could not be set to public."
            echo "If these are 404/permission errors, ensure PACKAGES_ADMIN_TOKEN is set to a token that can administer org packages."
            exit 1
          fi
