name: Release Health

# Reusable, dry-run-only release health check. Runs the same `release-plz update`
# preview + cargo-semver-checks that the real release path uses, but publishes
# nothing. Extracted so the nightly can call THIS (a single job) instead of the
# full release-plz.yml — which would pull release-plz's entire downstream graph
# (its publish-plugins + set-public-visibility) into the nightly run as skipped
# noise. The pinned release-plz / cargo-semver-checks versions live here and in
# release-plz.yml; keep them in sync.

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  release-health:
    name: Release-plz dry-run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq libjq-dev protobuf-compiler

      - name: Set JQ_LIB_DIR
        run: echo "JQ_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV

      - name: Install Rust toolchain
        run: rustup show

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install release-plz
        run: |
          curl -sSfL https://github.com/release-plz/release-plz/releases/download/release-plz-v0.3.157/release-plz-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin

      - name: Install cargo-semver-checks
        run: |
          curl -sSfL https://github.com/obi1kenobi/cargo-semver-checks/releases/download/v0.45.0/cargo-semver-checks-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin
          cargo-semver-checks --version

      - name: Release-plz dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== release-plz update (dry-run: version bumps, changelog, semver checks) ==="
          release-plz update
          echo "=== release-plz dry-run passed ==="
