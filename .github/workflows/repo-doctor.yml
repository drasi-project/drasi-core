name: repo-doctor

on:
  push:
    branches: 
      - repo-doctor-test
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: ruokun-niu/repo-doctor@v0.2.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          preset: standard
          fail-on: never
